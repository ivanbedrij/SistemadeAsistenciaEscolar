<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Sistema de Asistencia Escolar</title><style>body{font-family:Arial,sans-serif;background:#e8f7ff;margin:0;padding:20px}.container{max-width:1000px;margin:auto;background:white;padding:20px;border-radius:15px;box-shadow:0 0 10px rgba(0,0,0,.2)}h1{text-align:center;color:#0099cc}input,select,button{padding:10px;margin:5px;border-radius:8px;border:1px solid #ccc}button{background:#66ccff;color:white;border:none;cursor:pointer}button:hover{background:#0099cc}table{width:100%;margin-top:20px;border-collapse:collapse}th{background:#66ccff;color:white}td,th{padding:10px;border:1px solid #ddd;text-align:center}</style></head><body><div class='container'><h1>Sistema de Asistencia Escolar</h1><h3>Registrar estudiante</h3><input id='nombre' placeholder='Nombre del estudiante'><input id='telefono' placeholder='Teléfono (549...)'><input type='date' id='fecha'><button onclick='agregar()'>Guardar</button><button onclick='borrarSeleccionados()'>Borrar seleccionados</button><table><thead><tr><th>Seleccionar</th><th>Nombre</th><th>Teléfono</th><th>Fecha</th><th>Asistencia</th><th>Mensaje</th></tr></thead><tbody id='lista'></tbody></table></div><script>let estudiantes=JSON.parse(localStorage.getItem('estudiantes'))||[];const nombre=document.getElementById('nombre');const telefono=document.getElementById('telefono');const fecha=document.getElementById('fecha');function guardar(){localStorage.setItem('estudiantes',JSON.stringify(estudiantes));render()}function agregar(){if(!nombre.value||!telefono.value||!fecha.value){alert('Complete todos los campos');return}estudiantes.push({nombre:nombre.value,telefono:telefono.value,fecha:fecha.value});guardar();nombre.value='';telefono.value='';fecha.value=''}function render(){let t=document.getElementById('lista');t.innerHTML='';estudiantes.forEach((e,i)=>{t.innerHTML+=`<tr><td><input type='checkbox' class='sel' data-id='${i}'></td><td>${e.nombre}</td><td>${e.telefono}</td><td>${e.fecha}</td><td><select id='estado${i}'><option>Asistió</option><option>Faltó</option></select></td><td><button onclick='enviar(${i})'>Enviar WhatsApp</button></td></tr>`})}function borrarSeleccionados(){let checks=document.querySelectorAll('.sel:checked');let ids=[...checks].map(c=>parseInt(c.dataset.id)).sort((a,b)=>b-a);ids.forEach(i=>estudiantes.splice(i,1));guardar()}function enviar(i){let est=document.getElementById('estado'+i).value;let a=estudiantes[i];let m=est==='Asistió'?`Hola. Informamos que ${a.nombre} asistió a clases el día ${a.fecha}.`:`Hola. Informamos que ${a.nombre} registró una inasistencia el día ${a.fecha}.`;window.open(`https://wa.me/${a.telefono}?text=${encodeURIComponent(m)}`,'_blank')}render();</script></body></html>
